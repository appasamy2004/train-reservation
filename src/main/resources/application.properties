spring.application.name=TrainReservationSystem


# DATABASE CONNECTION

# Your MySQL database URL
spring.datasource.url=jdbc:mysql://localhost:3306/train_reservation?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true

# Your MySQL username (usually root for local)
spring.datasource.username=root

# Your MySQL password ? change this to YOUR password
spring.datasource.password=YOUR_PASSWORD_HERE

# MySQL driver class
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# HIBERNATE / JPA SETTINGS


# update = Hibernate auto-creates/updates tables from Entity classes
spring.jpa.hibernate.ddl-auto=update

# Show SQL queries in console (helpful for debugging)
spring.jpa.show-sql=true

# Format the SQL so it's readable in console
spring.jpa.properties.hibernate.format_sql=true

# Tell Hibernate we are using MySQL 8
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

spring.datasource.hikari.maximum-pool-size=10

# Min connections kept ready even when idle
spring.datasource.hikari.minimum-idle=5

# Wait max 30 seconds to get a connection before failing
spring.datasource.hikari.connection-timeout=30000

# THYMELEAF (HTML Template Engine)

# Disable caching so changes show immediately during development
spring.thymeleaf.cache=false

# Where to look for HTML files
spring.thymeleaf.prefix=classpath:/templates/

# All template files must end with .html
spring.thymeleaf.suffix=.html

# App runs on http://localhost:8080
server.port=8080


# Show our app's debug logs
logging.level.com.trainreservation=DEBUG

# Show SQL queries from Hibernate
logging.level.org.hibernate.SQL=DEBUG

# Thread pool for our scheduled tasks (auto seat reset)
spring.task.scheduling.pool.size=2